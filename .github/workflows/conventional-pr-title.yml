name: Conventional PR title

on:
  pull_request:
    types:
      - opened
      - edited
      - reopened
      - synchronize
      - ready_for_review
    branches:
      - master
      - main

permissions:
  contents: read
  pull-requests: read

jobs:
  validate-title:
    runs-on: ubuntu-latest

    steps:
      - name: Validate title
        uses: actions/github-script@v7
        with:
          script: |
            const title = context.payload.pull_request.title;
            const pattern = /^(build|chore|ci|docs|feat|fix|perf|refactor|revert|style|test)(\([a-z0-9._-]+\))?!?: .+/;

            if (!pattern.test(title)) {
              core.setFailed(
                [
                  `Pull request title "${title}" is not a Conventional Commit title.`,
                  '',
                  'Use one of these formats:',
                  '- feat: add country comparison',
                  '- fix(chart): handle empty data',
                  '- feat!: remove legacy data source',
                  '',
                  'Allowed types: build, chore, ci, docs, feat, fix, perf, refactor, revert, style, test.',
                ].join('\n')
              );
            }
