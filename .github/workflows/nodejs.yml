name: Bun CI

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - master
      - main
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:

    runs-on: ubuntu-latest

    strategy:
      matrix:
        bun-version: [1.3.14]

    steps:
    - uses: actions/checkout@v6
    - name: Use Bun ${{ matrix.bun-version }}
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: ${{ matrix.bun-version }}
    - run: bun install --frozen-lockfile
    - run: bun run lint
    - run: bun run typecheck
    - run: bun run build
    - run: bun run test
